<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md dark:shadow-black/25 w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-6">{{ 'register.title' | transloco }}</h2>
    @if (error()) {
      <div class="bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-400 px-4 py-2 rounded mb-4 text-sm">{{ error() }}</div>
    }
    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ 'register.name' | transloco }}</label>
        <input type="text" [(ngModel)]="name" name="name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100" />
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ 'register.email' | transloco }}</label>
        <input type="email" [(ngModel)]="email" name="email" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ 'register.password' | transloco }}</label>
        <input type="password" [(ngModel)]="password" name="password" required minlength="6" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100" />
      </div>
      <button type="submit" [disabled]="loading()" class="w-full bg-emerald-500 text-white py-2 px-4 rounded-lg hover:bg-emerald-600 disabled:opacity-50 transition-colors">{{ 'register.registerBtn' | transloco }}</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500 dark:text-gray-400">{{ 'register.hasAccount' | transloco }} <a routerLink="/login" class="text-emerald-600 dark:text-emerald-400 hover:underline">{{ 'register.login' | transloco }}</a></p>
  </div>
</div>
