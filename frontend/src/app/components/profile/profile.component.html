<div class="max-w-[900px] mx-auto px-4 sm:px-10 py-8 pb-[60px]">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-7">{{ 'profile.title' | transloco }}</h1>

  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-7 mb-5">
    <h2 class="text-lg font-bold text-gray-900 dark:text-gray-100 mb-6">{{ 'profile.userInfo' | transloco }}</h2>

    <div class="mb-5">
      <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-2">{{ 'profile.username' | transloco }}</label>
      <div class="relative flex items-center">
        <span class="absolute left-3.5 text-gray-400 dark:text-gray-500 flex items-center pointer-events-none">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </span>
        <input type="text" [value]="auth.user()?.name ?? ''" readonly class="w-full pl-11 pr-3.5 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-700 cursor-default outline-none box-border" />
      </div>
    </div>

    <div class="mb-5">
      <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-2">{{ 'profile.email' | transloco }}</label>
      <div class="relative flex items-center">
        <span class="absolute left-3.5 text-gray-400 dark:text-gray-500 flex items-center pointer-events-none">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </span>
        <input type="email" [value]="auth.user()?.email ?? ''" readonly class="w-full pl-11 pr-3.5 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-700 cursor-default outline-none box-border" />
      </div>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-7 mb-5">
    <h2 class="text-lg font-bold text-gray-900 dark:text-gray-100 mb-6">{{ 'profile.changePassword' | transloco }}</h2>

    @if (pwSuccess()) {
      <div class="bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-700 text-emerald-700 dark:text-emerald-400 rounded-xl px-3.5 py-2.5 text-xs mb-4">{{ pwSuccess() }}</div>
    }
    @if (pwError()) {
      <div class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-700 text-red-600 dark:text-red-400 rounded-xl px-3.5 py-2.5 text-xs mb-4">{{ pwError() }}</div>
    }

    <div class="mb-5">
      <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-2">{{ 'profile.currentPassword' | transloco }}</label>
      <div class="relative flex items-center">
        <span class="absolute left-3.5 text-gray-400 dark:text-gray-500 flex items-center pointer-events-none">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </span>
        <input type="password" [(ngModel)]="currentPw" [placeholder]="'profile.currentPasswordPlaceholder' | transloco" class="w-full pl-11 pr-3.5 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 outline-none transition-colors focus:border-emerald-500 box-border placeholder:text-gray-400 dark:placeholder:text-gray-500" />
      </div>
    </div>

    <div class="mb-5">
      <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-2">{{ 'profile.newPassword' | transloco }}</label>
      <div class="relative flex items-center">
        <span class="absolute left-3.5 text-gray-400 dark:text-gray-500 flex items-center pointer-events-none">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </span>
        <input type="password" [(ngModel)]="newPw" [placeholder]="'profile.newPasswordPlaceholder' | transloco" class="w-full pl-11 pr-3.5 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 outline-none transition-colors focus:border-emerald-500 box-border placeholder:text-gray-400 dark:placeholder:text-gray-500" />
      </div>
    </div>

    <div class="mb-5">
      <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-2">{{ 'profile.confirmPassword' | transloco }}</label>
      <div class="relative flex items-center">
        <span class="absolute left-3.5 text-gray-400 dark:text-gray-500 flex items-center pointer-events-none">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </span>
        <input type="password" [(ngModel)]="confirmPw" [placeholder]="'profile.confirmPasswordPlaceholder' | transloco" class="w-full pl-11 pr-3.5 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 outline-none transition-colors focus:border-emerald-500 box-border placeholder:text-gray-400 dark:placeholder:text-gray-500" />
      </div>
    </div>

    <button (click)="changePassword()" [disabled]="saving()" class="inline-flex items-center gap-2 px-7 py-2.5 bg-emerald-500 text-white border-none rounded-xl text-sm font-semibold cursor-pointer transition-colors hover:bg-emerald-600 disabled:opacity-65 disabled:cursor-not-allowed mt-2">
      @if (saving()) {
        <svg class="animate-spin" fill="none" viewBox="0 0 24 24" width="16" height="16">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity:0.25"></circle>
          <path fill="currentColor" style="opacity:0.75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        {{ 'profile.saving' | transloco }}
      } @else {
        {{ 'profile.saveChanges' | transloco }}
      }
    </button>
  </div>
</div>
