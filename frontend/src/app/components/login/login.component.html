<div class="min-h-screen bg-gray-100 dark:bg-gray-900 flex flex-col items-center justify-center px-4 py-6">

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-md dark:shadow-black/25 px-9 py-10 pb-8 w-full max-w-[420px] flex flex-col items-center">

    <div class="w-[60px] h-[60px] bg-emerald-500 rounded-2xl flex items-center justify-center text-white mb-5 shadow-lg" style="box-shadow:0 4px 16px rgba(16,185,129,0.35)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="28" height="28">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 m-0 mb-1.5 text-center">{{ 'login.welcome' | transloco }}</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 m-0 mb-7 text-center">{{ 'login.subtitle' | transloco }}</p>

    @if (error()) {
      <div class="w-full bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-xs px-3.5 py-2.5 rounded-xl mb-4">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="w-full flex flex-col gap-4">

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold tracking-wider text-gray-600 dark:text-gray-400">{{ 'login.email' | transloco }}</label>
        <div class="relative flex items-center">
          <span class="absolute left-3.5 text-gray-400 dark:text-gray-500 flex items-center pointer-events-none">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </span>
          <input type="email" [(ngModel)]="email" name="email" required [placeholder]="'login.emailPlaceholder' | transloco" class="w-full pl-11 pr-3.5 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 outline-none transition-colors focus:border-emerald-500 focus:shadow-[0_0_0_3px_rgba(16,185,129,0.12)] box-border placeholder:text-gray-400 dark:placeholder:text-gray-500" />
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold tracking-wider text-gray-600 dark:text-gray-400">{{ 'login.password' | transloco }}</label>
        <div class="relative flex items-center">
          <span class="absolute left-3.5 text-gray-400 dark:text-gray-500 flex items-center pointer-events-none">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </span>
          <input type="password" [(ngModel)]="password" name="password" required [placeholder]="'login.passwordPlaceholder' | transloco" class="w-full pl-11 pr-3.5 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 outline-none transition-colors focus:border-emerald-500 focus:shadow-[0_0_0_3px_rgba(16,185,129,0.12)] box-border placeholder:text-gray-400 dark:placeholder:text-gray-500" />
        </div>
      </div>

      <button type="submit" [disabled]="loading()" class="w-full py-3.5 bg-emerald-500 text-white border-none rounded-xl text-sm font-semibold cursor-pointer flex items-center justify-center gap-2 transition-colors hover:bg-emerald-600 disabled:opacity-65 disabled:cursor-not-allowed mt-1">
        @if (loading()) {
          <svg class="animate-spin" fill="none" viewBox="0 0 24 24" width="18" height="18">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity:0.25"></circle>
            <path fill="currentColor" style="opacity:0.75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ 'login.signingIn' | transloco }}
        } @else {
          {{ 'login.signIn' | transloco }}
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
          </svg>
        }
      </button>

    </form>

    <div class="w-full h-px bg-gray-50 dark:bg-gray-700 my-6"></div>

    <p class="text-sm text-gray-500 dark:text-gray-400 m-0 text-center">
      {{ 'login.noAccount' | transloco }}
      <a routerLink="/register" class="text-emerald-500 font-semibold no-underline hover:underline">{{ 'login.signUp' | transloco }}</a>
    </p>

  </div>

  <p class="text-xs text-gray-400 dark:text-gray-500 mt-5 text-center">{{ 'login.terms' | transloco }}</p>
</div>
